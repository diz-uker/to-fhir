to-fhir:
  # Enable to-FHIR auto-configuration
  # Set to false to disable auto-configuration of to-FHIR utilities
  enabled: true

  # FHIR version to use
  # Supported versions: R4, R5
  fhir-version: R4

  # Enable resource validation
  # When enabled, resources created through the utilities will be validated
  validate-resources: true

  # Enable strict reference validation
  # When enabled, all references will be strictly validated
  strict-reference-validation: false
